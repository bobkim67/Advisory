# GlidePath Reference — 4 vintage 주식 편입비
#
# 운영자 직접 정보 (2026-05-08, D-08 closed_with_permanent_limitation):
#   원본 `0. 정리 - GlidePath 값.xlsx` 는 DRM 보호로 해제 불가.
#   대신 운영자가 핵심값을 직접 제공 → 본 yaml 에 metadata 로 보존.
#
# 위상:
