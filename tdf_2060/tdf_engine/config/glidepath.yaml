#   - 본 yaml 의 값은 코드에서 직접 enforce 하지 않음 (현재 reference only).
#
# 정합성:
#   - 2060 의 equity 0.80 = `tdf_2060.yaml::strategic_allocation.equity` 와 일치 ✓
#   - 합 (equity + fixed_income) = 1.0 (alternative bucket 도입 전 기준)

glidepath_reference:
  source: "운영자 직접 정보 (DRM xlsx 해제 불가)"
  source_file_drm_locked: "Advisory/0. 정리 - GlidePath 값.xlsx"
  as_of: "2026-05-08"
  unit: "주식 편입비 (equity bucket weight)"
  enforced: false                # Phase D relaxed_diagnostic — reference only
  vintages:
    "2060":
      equity: 0.80
      fixed_income: 0.20
      target_year: 2060
      note: "현재 산출 대상. tdf_2060.yaml::strategic_allocation 와 정합."
    "2050":
      equity: 0.70
      fixed_income: 0.30
      target_year: 2050
