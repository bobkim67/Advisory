    "2040":
      equity: 0.60
      fixed_income: 0.40
      target_year: 2040
      note: "reference only. 본 단계 미산출."
    "2030":
      equity: 0.50
      fixed_income: 0.50
      target_year: 2030
      note: "reference only. 본 단계 미산출."
  notes: |
    - 본 정보는 DRM 보호 파일의 metadata 대체.
    - GlidePath 다중 vintage 엔진 산출은 후속 Phase 에서 검토.
    - alternative bucket (gold, REIT 등) 도입 시 fixed_income = 1 - equity 가정 재검토 필요.
